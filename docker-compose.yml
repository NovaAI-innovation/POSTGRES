 r4services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-memory-api
    restart: unless-stopped
    command: ["python", "-m", "app.server"]
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./backups:/app/backups
      - ./eval:/app/eval:ro

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: central-gateway
    restart: unless-stopped
    command:
      [
        "python",
        "scripts/gateway/central_gateway.py",
        "--host",
        "0.0.0.0",
        "--port",                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 v                                                                                                                                                                           v                                                                                                                   eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       rrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrrr                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
        "8787",
        "--target-base-url",
        "http://api:8000"
      ]
    env_file:
      - .env.docker
    ports:
      - "8787:8787"
    depends_on:
      - api
